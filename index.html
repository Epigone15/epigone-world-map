<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Carte Interactive Stylée</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
        }

        h1 {
            text-align: center;
            margin: 10px;
            font-weight: 600;
        }

        #map {
            height: 90vh;
        }

        .panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(15,23,42,0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .palette {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .color {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .color:hover {
            transform: scale(1.2);
        }

        .active {
            border: 2px solid white;
        }

        button {
            margin-top: 10px;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .reset { background: #ef4444; color: white; }
        .erase { background: #64748b; color: white; }
    </style>
</head>

<body>

    <h1>🌍 Carte à Colorier Pro</h1>

    <div class="panel">
        <b>🎨 Couleurs :</b>
        <div class="palette" id="palette"></div>

        <button class="erase" onclick="eraseMode()">🧽 Gomme</button>
        <button class="reset" onclick="resetMap()">♻️ Reset</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map', {
            zoomControl: false
        }).setView([20,0], 2);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        const colors = [
            "#ef4444","#f97316","#eab308","#22c55e",
            "#06b6d4","#3b82f6","#8b5cf6","#ec4899"
        ];

        let selectedColor = colors[0];
        let erase = false;

        const palette = document.getElementById("palette");

        colors.forEach(c => {
            const el = document.createElement("div");
            el.className = "color";
            el.style.background = c;
            el.onclick = () => {
                erase = false;
                selectedColor = c;
                document.querySelectorAll(".color").forEach(e=>e.classList.remove("active"));
                el.classList.add("active");
            };
            palette.appendChild(el);
        });

        palette.children[0].classList.add("active");

        function eraseMode(){
            erase = true;
        }

        function resetMap(){
            localStorage.clear();
            location.reload();
        }

        const saved = JSON.parse(localStorage.getItem("mapColors") || "{}");

        function style(feature){
            return {
                fillColor: saved[feature.id] || "#1e293b",
                weight: 0.5,
                color: "#475569",
                fillOpacity: 0.8
            };
        }

        function highlight(e){
            e.target.setStyle({
                weight: 2,
                color: "#fff"
            });
        }

        function resetHighlight(e){
            geojson.resetStyle(e.target);
        }

        function clickFeature(e){
            const id = e.target.feature.id;
            if(erase){
                delete saved[id];
            } else {
                saved[id] = selectedColor;
            }
            localStorage.setItem("mapColors", JSON.stringify(saved));
            e.target.setStyle({ fillColor: saved[id] || "#1e293b" });
        }

        function onEach(feature, layer){
            layer.on({
                mouseover: highlight,
                mouseout: resetHighlight,
                click: clickFeature
            });
            layer.bindTooltip(feature.properties.name);
        }

        let geojson;

        fetch("https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json")
        .then(res => res.json())
        .then(data => {
            geojson = L.geoJSON(data, {
                style: style,
                onEachFeature: onEach
            }).addTo(map);
        });
    </script>

</body>
</html>
