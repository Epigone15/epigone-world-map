<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte du Monde à Colorier (Pays Entiers)</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet-Geojson CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-geojson@2.0.0/leaflet-geojson.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        #map {
            height: 85vh;
            width: 100%;
            margin: 0 auto;
        }
        .info-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        .color-palette {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }
        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #333;
        }
        #reset-btn {
            margin-top: 10px;
            padding: 8px 15px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #reset-btn:hover {
            background: #ff3742;
        }
        h1 {
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Carte du Monde à Colorier (Pays Entiers)</h1>
    <div class="info-panel">
        <p><strong>Instructions :</strong></p>
        <p>1. Choisis une couleur dans la palette.</p>
        <p>2. Clique sur un pays pour le colorier.</p>
        <p>3. Utilise "Réinitialiser" pour tout effacer.</p>
        <div class="color-palette" id="color-palette"></div>
        <button id="reset-btn">Réinitialiser</button>
    </div>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet-Geojson JS -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet-geojson@2.0.0/leaflet-geojson.js"></script>
    <script>
        // Initialisation de la carte
        const map = L.map('map').setView([20, 0], 2);

        // Ajout de la couche OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Palette de couleurs
        const colors = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', '#33FFF3'];
        const colorPalette = document.getElementById('color-palette');
        let selectedColor = colors[0];

        colors.forEach(color => {
            const div = document.createElement('div');
            div.className = 'color-option';
            div.style.backgroundColor = color;
            div.addEventListener('click', () => {
                selectedColor = color;
                document.querySelectorAll('.color-option').forEach(opt => opt.style.border = '2px solid #333');
                div.style.border = '2px solid black';
            });
            colorPalette.appendChild(div);
        });

        // Réinitialisation
        document.getElementById('reset-btn').addEventListener('click', () => {
            localStorage.removeItem('coloredCountries');
            location.reload();
        });

        // Chargement des pays coloriés
        const coloredCountries = JSON.parse(localStorage.getItem('coloredCountries')) || {};

        // Style par défaut pour les pays
        function getCountryStyle(countryId) {
            return {
                fillColor: coloredCountries[countryId] || '#dddddd',
                weight: 1,
                opacity: 1,
                color: '#888',
                fillOpacity: 0.8
            };
        }

        // Fonction pour appliquer la couleur à un pays
        function colorCountry(countryId, color) {
            coloredCountries[countryId] = color;
            localStorage.setItem('coloredCountries', JSON.stringify(coloredCountries));
            if (window.countryLayers && window.countryLayers[countryId]) {
                window.countryLayers[countryId].setStyle({ fillColor: color });
            }
        }

        // Exemple de GeoJSON simplifié pour les pays (tu peux remplacer par un vrai GeoJSON)
        // Ici, on va simuler avec un petit exemple de pays pour l'exemple
        const countriesGeoJSON = {
            "type": "FeatureCollection",
            "features": [
                { "type": "Feature", "properties": { "name": "France", "id": "FR" }, "geometry": { "type": "Polygon", "coordinates": [ [ [2.2137, 46.2276], [2.2137, 46.2276] ] ] } },
                { "type": "Feature", "properties": { "name": "Allemagne", "id": "DE" }, "geometry": { "type": "Polygon", "coordinates": [ [ [10.4515, 51.1657], [10.4515, 51.1657] ] ] } },
                { "type": "Feature", "properties": { "name": "Italie", "id": "IT" }, "geometry": { "type": "Polygon", "coordinates": [ [ [12.5674, 41.8719], [12.5674, 41.8719] ] ] } },
                { "type": "Feature", "properties": { "name": "Espagne", "id": "ES" }, "geometry": { "type": "Polygon", "coordinates": [ [ [-3.7492, 40.4637], [-3.7492, 40.4637] ] ] } },
                { "type": "Feature", "properties": { "name": "États-Unis", "id": "US" }, "geometry": { "type": "Polygon", "coordinates": [ [ [-95.7129, 37.0902], [-95.7129, 37.0902] ] ] } },
                { "type": "Feature", "properties": { "name": "Japon", "id": "JP" }, "geometry": { "type": "Polygon", "coordinates": [ [ [138.2529, 36.2048], [138.2529, 36.2048] ] ] } }
            ]
        };

        // Ajout des pays à la carte
        const countryLayers = {};
        countriesGeoJSON.features.forEach(feature => {
            const countryId = feature.properties.id;
            const countryName = feature.properties.name;
            const geojson = L.geoJSON(feature, {
                style: getCountryStyle(countryId),
                onEachFeature: function (feature, layer) {
                    layer.bindPopup(`<b>${countryName}</b>`);
                    layer.on('click', () => {
                        colorCountry(countryId, selectedColor);
                    });
                }
            });
            geojson.addTo(map);
            countryLayers[countryId] = geojson;
        });
        window.countryLayers = countryLayers;
    </script>
</body>
</html>
